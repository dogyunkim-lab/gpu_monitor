global:
  scrape_interval: 5s
  evaluation_interval: 15s
rule_files:
- rules/*.yml
scrape_configs:
- job_name: dcgm
  metrics_path: /metrics
  scrape_interval: 5s
  static_configs:
  - targets:
    - gpu-vm-01:9400
    - gpu-vm-02:9400
    - gpu-vm-03:9400
    - gpu-vm-04:9400
    - gpu-vm-05:9400
    labels:
      cluster: gpu
  relabel_configs:
  - source_labels:
    - __address__
    regex: ([^:]+):\d+
    target_label: vm
- job_name: vllm
  scrape_interval: 1s
  metrics_path: /metrics
  static_configs:
  - targets:
    - gpu-vm-01:8000
    labels:
      model_name: qwen3-30b
  - targets:
    - gpu-vm-01:8001
    labels:
      model_name: llama-70b
  - targets:
    - gpu-vm-02:8000
    labels:
      model_name: qwen3-30b-2
  - targets:
    - gpu-vm-03:8000
    labels:
      model_name: mistral-7b
  relabel_configs:
  - source_labels:
    - __address__
    regex: ([^:]+):\d+
    target_label: instance
- job_name: node
  scrape_interval: 5s
  metrics_path: /metrics
  static_configs:
  - targets:
    - gpu-vm-01:9100
    - gpu-vm-02:9100
    - gpu-vm-03:9100
    - gpu-vm-04:9100
    - gpu-vm-05:9100
  relabel_configs:
  - source_labels:
    - __address__
    regex: ([^:]+):\d+
    target_label: vm
