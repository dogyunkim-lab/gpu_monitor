# GPU Monitor 설정 예시
# 이 파일을 config.yaml로 복사하여 사용하세요.
# 용도: Prometheus + Grafana 설정 파일 자동 생성

vms:
  - host: "gpu-vm-01"
    port: 9400
    name: "GPU-VM-01"
  - host: "gpu-vm-02"
    port: 9400
    name: "GPU-VM-02"
  - host: "gpu-vm-03"
    port: 9400
    name: "GPU-VM-03"
  - host: "gpu-vm-04"
    port: 9400
    name: "GPU-VM-04"
  - host: "gpu-vm-05"
    port: 9400
    name: "GPU-VM-05"

alerts:
  gpu_util_threshold: 95.0      # GPU 사용률 경고 임계값 (%)
  gpu_util_duration: "1m"        # 지속 시간 (Prometheus duration)
  temperature_threshold: 83.0    # 온도 경고 (°C)
  vram_util_threshold: 95.0      # VRAM 사용률 경고 (%)
  power_threshold: 350.0         # 전력 경고 (W)

prometheus:
  output_dir: "/etc/prometheus"
  scrape_interval: "5s"
  evaluation_interval: "15s"
  job_name: "dcgm"
  metrics_path: "/metrics"

grafana:
  output_dir: "/etc/grafana"
  provisioning_dir: "/etc/grafana/provisioning"
  datasource_url: "http://localhost:9090"
  dashboard_title: "GPU Cluster Monitor"

# vLLM 서버 모니터링
vllm:
  scrape_interval: "1s"
  job_name: "vllm"
  models:
    - host: "gpu-vm-01"
      port: 8000
      model_name: "qwen3-30b"
    - host: "gpu-vm-01"
      port: 8001
      model_name: "llama-70b"
    - host: "gpu-vm-02"
      port: 8000
      model_name: "qwen3-30b-2"
    - host: "gpu-vm-03"
      port: 8000
      model_name: "mistral-7b"
